<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0" stop-color="#8fb4ff"/><stop offset="0.5" stop-color="#2f63f0"/><stop offset="1" stop-color="#1e44c8"/>
    </linearGradient>
    <!-- pgplex pinwheel with pure-triangle blades: one blade is a right
         triangle whose base is a full side of the central square, spun so its
         free corner sweeps clockwise. The four 90deg copies form a windmill
         of triangular sails around an empty square centre — same four-blade
         pinwheel + hollow-square language as the pgplex logo, but every border
         is a strict triangle. Sails reach 21..99, square 45..75. -->
    <path id="blade" d="M45 45 L75 45 L75 21 Z"/>
  </defs>
  <g fill="url(#g)">
    <use href="#blade"/>
    <use href="#blade" transform="rotate(90 60 60)"/>
    <use href="#blade" transform="rotate(180 60 60)"/>
    <use href="#blade" transform="rotate(270 60 60)"/>
  </g>
</svg>
