name = "demo"
main = "src/index.ts"
compatibility_date = "2025-07-01"

routes = [
  { pattern = "demo.pgconsole.com", custom_domain = true }
]

[[containers]]
class_name = "PgConsole"
image = "pgplex/pgconsole:1.1.1"
max_instances = 1

[[durable_objects.bindings]]
class_name = "PgConsole"
name = "PGCONSOLE_CONTAINER"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PgConsole"]

[observability]
enabled = true
head_sampling_rate = 1
